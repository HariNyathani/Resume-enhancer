<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Enhancer</title>
    <meta name="description" content="Optimize your LaTeX resume against any Job Description using AI.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* ===== DESIGN SYSTEM ===== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --bg-input: #1a1a26;
            --border-color: #2a2a3a;
            --border-focus: #6c5ce7;
            --text-primary: #e8e8f0;
            --text-secondary: #9898aa;
            --text-muted: #6a6a7a;
            --accent-primary: #6c5ce7;
            --accent-primary-hover: #7f71ec;
            --accent-green: #00c853;
            --accent-green-hover: #1de068;
            --accent-red: #ff5252;
            --accent-cyan: #00e5ff;
            --glow-primary: rgba(108, 92, 231, 0.25);
            --glow-green: rgba(0, 200, 83, 0.2);
            --radius: 12px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== GLOBAL RESET ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle animated background grain */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 0%, rgba(108, 92, 231, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(0, 229, 255, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== LAYOUT ===== */
        .app-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* ===== HEADER ===== */
        .app-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .app-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 2.8rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #6c5ce7, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
        }

        .app-header .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* ===== CARD PANELS ===== */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.75rem;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .panel:hover {
            border-color: rgba(108, 92, 231, 0.3);
            box-shadow: 0 0 20px var(--glow-primary);
        }

        .panel-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            padding-bottom: 0.75rem;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title i {
            color: var(--accent-primary);
            font-size: 1.1rem;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-label-custom {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            resize: vertical;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        .form-textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--glow-primary);
        }

        .form-textarea::placeholder {
            color: var(--text-muted);
        }

        .form-textarea.mono {
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        /* ===== BUTTONS ===== */
        .btn-action {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            padding: 0.7rem 1.5rem;
            transition: all var(--transition);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary-glow {
            background: linear-gradient(135deg, var(--accent-primary), #8b7cf0);
            color: #fff;
            box-shadow: 0 4px 15px var(--glow-primary);
        }

        .btn-primary-glow:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-primary-hover), #9d90f5);
            box-shadow: 0 6px 25px var(--glow-primary);
            transform: translateY(-1px);
        }

        .btn-primary-glow:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-success-glow {
            background: linear-gradient(135deg, var(--accent-green), #2de87a);
            color: #fff;
            box-shadow: 0 4px 15px var(--glow-green);
        }

        .btn-success-glow:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-green-hover), #40f08a);
            box-shadow: 0 6px 25px var(--glow-green);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-ghost:hover:not(:disabled) {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== SCORE CARDS ===== */
        .score-strip {
            display: flex;
            gap: 1rem;
        }

        .score-card {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            text-align: center;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .score-card.before {
            border-left: 3px solid var(--accent-red);
        }

        .score-card.after {
            border-left: 3px solid var(--accent-green);
        }

        .score-card:hover {
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.1);
        }

        .score-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .score-value {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .score-value.red {
            color: var(--accent-red);
        }

        .score-value.green {
            color: var(--accent-green);
        }

        /* ===== SUGGESTIONS ===== */
        .suggestions-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .suggestions-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .suggestions-list li {
            font-size: 0.82rem;
            color: var(--text-secondary);
            padding: 0.45rem 0 0.45rem 1.2rem;
            position: relative;
            line-height: 1.5;
        }

        .suggestions-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.85rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-primary);
        }

        /* ===== OUTPUT SECTION ===== */
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .output-actions {
            display: flex;
            gap: 0.5rem;
        }

        .output-textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            color: var(--accent-cyan);
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            min-height: 220px;
        }

        /* ===== LOADING SPINNER ===== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .loading-text span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .space-y>*+* {
            margin-top: 1rem;
        }

        .space-y-sm>*+* {
            margin-top: 0.75rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }

            .app-header h1 {
                font-size: 2.2rem;
            }
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast-notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--accent-green);
            color: var(--text-primary);
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-size: 0.85rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast-notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== FOOTER ===== */
        .app-footer {
            text-align: center;
            padding: 2rem 0 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="app-container">

        <!-- HEADER -->
        <header class="app-header">
            <h1>AI Resume Enhancer</h1>
            <p class="subtitle">Optimize your LaTeX resume against any Job Description — powered by AI</p>
        </header>

        <!-- MAIN GRID -->
        <div class="grid-layout">

            <!-- LEFT: INPUT PANEL -->
            <div class="panel" id="inputPanel">
                <div class="panel-title">
                    <i class="bi bi-pencil-square"></i> Input
                </div>
                <div class="space-y">
                    <div>
                        <label class="form-label-custom" for="jdInput">Job Description</label>
                        <textarea id="jdInput" class="form-textarea" rows="6"
                            placeholder="Paste the Job Description here..."></textarea>
                    </div>
                    <div>
                        <label class="form-label-custom" for="resumeInput">Current LaTeX Resume</label>
                        <textarea id="resumeInput" class="form-textarea mono" rows="10"
                            placeholder="Paste your LaTeX code here..."></textarea>
                    </div>
                    <button onclick="optimizeResume()" id="submitBtn" class="btn btn-action btn-primary-glow w-100">
                        <i class="bi bi-rocket-takeoff"></i> Analyze &amp; Optimize
                    </button>
                </div>
            </div>

            <!-- RIGHT: RESULTS PANEL -->
            <div class="panel" id="resultsPanel">
                <div class="panel-title">
                    <i class="bi bi-bar-chart-line"></i> Results
                </div>

                <!-- Loading State -->
                <div id="loading" class="hidden loading-state">
                    <div class="spinner"></div>
                    <p class="loading-text"><span>AI</span> is analyzing and rewriting your resume...<br>This may take a
                        few minutes.</p>
                </div>

                <!-- Results Content -->
                <div id="resultsContent" class="hidden space-y">

                    <!-- Score Cards -->
                    <div class="score-strip">
                        <div class="score-card before">
                            <div class="score-label">Initial Match</div>
                            <div id="initialScore" class="score-value red"></div>
                        </div>
                        <div class="score-card after">
                            <div class="score-label">Updated Match</div>
                            <div id="updatedScore" class="score-value green"></div>
                        </div>
                    </div>

                    <!-- Suggestions -->
                    <div>
                        <div class="suggestions-title">
                            <i class="bi bi-lightbulb"></i> Suggestions for Improvement
                        </div>
                        <ul id="suggestionsList" class="suggestions-list"></ul>
                    </div>

                    <!-- Output LaTeX -->
                    <div>
                        <div class="output-header">
                            <label class="form-label-custom">Updated LaTeX Code</label>
                            <div class="output-actions">
                                <button onclick="downloadPDF()" id="downloadBtn"
                                    class="btn btn-action btn-success-glow btn-sm">
                                    <i class="bi bi-file-earmark-pdf"></i> Download PDF
                                </button>
                                <button onclick="copyLatex()" id="copyBtn" class="btn btn-action btn-ghost btn-sm">
                                    <i class="bi bi-clipboard"></i> Copy Code
                                </button>
                            </div>
                        </div>
                        <textarea id="outputLatex" readonly class="output-textarea"
                            style="min-height: 220px;"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="app-footer">
            Built with Flask &amp; by @harinyathani &bull; &copy; 2026
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast-notification">
        <i class="bi bi-check-circle-fill" style="color: var(--accent-green);"></i>
        <span id="toastMessage">Copied!</span>
    </div>

    <script>
        // === Toast Notification ===
        function showToast(message, duration = 2500) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // === Main Submit ===
        async function optimizeResume() {
            const jd = document.getElementById('jdInput').value;
            const resume = document.getElementById('resumeInput').value;
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('resultsContent');

            if (!jd || !resume) {
                alert("Please provide both a Job Description and a Resume.");
                return;
            }

            // Lock UI
            btn.disabled = true;
            btn.classList.add('opacity-50');
            results.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                // Step 1: Tell backend to start the background task
                const response = await fetch('/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jd, resume })
                });

                const data = await response.json();

                if (data.status === 'accepted') {
                    // Step 2: The backend accepted it. Now we start polling!
                    pollStatus(data.task_id);
                } else {
                    alert("Backend Error: " + data.message);
                    resetUI();
                }
            } catch (error) {
                alert("A network error occurred starting the task.");
                console.error(error);
                resetUI();
            }
        }

        async function pollStatus(taskId) {
            // Ping the server every 3 seconds (3000 milliseconds)
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/status/${taskId}`);
                    const data = await response.json();

                    if (data.status === 'completed') {
                        // Task is done! Stop polling and show data.
                        clearInterval(pollInterval);
                        displayResults(data.result);
                    } else if (data.status === 'error') {
                        // Something crashed in the Python thread
                        clearInterval(pollInterval);
                        alert("Error during processing: " + data.message);
                        resetUI();
                    }
                    // If data.status === 'processing', it just ignores and loops again in 3 seconds.

                } catch (error) {
                    clearInterval(pollInterval);
                    alert("Network error while checking status.");
                    console.error(error);
                    resetUI();
                }
            }, 3000);
        }

        function displayResults(data) {
            if (data.status === 'success') {
                document.getElementById('initialScore').innerText = data.initial_score;
                document.getElementById('updatedScore').innerText = data.updated_score;
                document.getElementById('outputLatex').value = data.updated_latex;

                const suggestionsList = document.getElementById('suggestionsList');
                suggestionsList.innerHTML = '';
                data.suggestions.forEach(s => {
                    const li = document.createElement('li');
                    li.innerText = s;
                    suggestionsList.appendChild(li);
                });

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('resultsContent').classList.remove('hidden');
            } else {
                alert("Agent Error: " + data.message);
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('loading').classList.add('hidden');
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50');
        }

        function copyLatex() {
            const output = document.getElementById('outputLatex');
            output.select();
            document.execCommand('copy');
            showToast("LaTeX copied to clipboard!");
        }

        async function downloadPDF() {
            const latex = document.getElementById('outputLatex').value;
            if (!latex) {
                alert("No resume generated yet!");
                return;
            }

            const btn = document.getElementById('downloadBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Compiling...';
            btn.disabled = true;

            try {
                const response = await fetch('/download-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ latex })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    alert("Compilation Error: " + (errorData.message || "Unknown error"));
                    return;
                }

                // Convert the backend response into a downloadable file
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'Optimized_Resume.pdf'; // The file name the user sees
                document.body.appendChild(a);
                a.click();

                // Clean up
                window.URL.revokeObjectURL(url);
                showToast("PDF downloaded successfully!");
            } catch (error) {
                console.error("Download failed:", error);
                alert("A network error occurred while downloading.");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
